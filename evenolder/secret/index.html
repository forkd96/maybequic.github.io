<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>kissingboyssimulator.com</title>
<style>
  :root {
    --bg: #202124;
    --text: #e8eaed;
    --muted: #9aa0a6;
    --accent: #d2ccff;
    --accent-text: #2f1c6d;
  }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Roboto", "Noto Sans", "Helvetica Neue", Arial, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .flashbang-wrapper {
    position: relative;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  
  .flash {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    background-color: white;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 9999;
    pointer-events: none;
  }
  
  .flashbang-img {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 100%;
      max-height: 100%;
      z-index: 9998;
      pointer-events: none;
  }

  .wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    position: relative; 
    z-index: 1;
  }

  .box {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 800px;
    margin-bottom: 340px;
    margin-right: 200px;
    padding-left: 60px;
  }

  .content {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-left: 21%;
  }

  .icon {
    width: 35px;
    height: auto;
    margin-bottom: 45px;
    opacity: 0.95;
  }

  .title {
    margin: 0 0 8px 0;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: #9aa0a6;
  }

  .desc {
    margin: 0 0 10px 0;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
  }

  .domain {
    color: #9aa0a6;
    font-weight: 500;
  }

  .code {
    margin-top: 12px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .controls {
    display: flex;
    justify-content: flex-end;
    padding-right: 3%;
    margin-top: 60px;
  }

  .btn {
    appearance: none;
    border: none;
    padding: 8px 8px;
    border-radius: 8px;
    font-weight: 500;
    cursor: pointer;
    background: var(--accent);
    color: var(--accent-text);
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.15) inset;
    font-size: 13px;
  }

  .btn:hover {
    background: #e0d8ff;
  }

  .btn:focus {
    outline: 2px solid rgba(255, 255, 255, 0.1);
    outline-offset: 2px;
  }

  @media (max-width: 700px) {
    .content, .controls {
      padding-left: 8%;
      padding-right: 8%;
    }
    .title { font-size: 20px; }
  }
</style>
</head>
<body>
  <div class="flashbang-wrapper"> 
    <div class="flash"></div> 

    <img 
      src="https://f.vshark.xyz/upload-naqCV9DuJMD8.png"
      alt="Flashbang"
      width="150"
      style="align-self: center" 
      class="flashbang-img"
    >

    <div class="wrapper">
      <div class="box">
        <div class="content">
          <img src="https://f.vshark.xyz/screenshot_20251028_161530_597-SPUV5a9sDhCi.png" class="icon">
          <div class="title" style="margin-bottom: 15px;">Your connection was interrupted</div>
          <p class="desc">
            <span class="domain"></span>A network change was detected.
          </p>
          <div class="code">ERR_NETWORK_CHANGED</div>
        </div>

        <div class="controls">
          <button class="btn" onclick="triggerFlashbang()">Reload</button> 
        </div>
      </div>
    </div>
  </div>

  <audio id="bang" preload="auto">
      <source src="https://f.vshark.xyz/upload-S8ch6V6U5zy6.mp3" type="audio/mpeg" /> 
  </audio>

  <script>
    function triggerFlashbang({
        fadeIn = 500,
        hold = 2000,
        fadeOut = 2500
    } = {}) {
        const image = document.querySelector('.flashbang-img');
        const flash = document.querySelector('.flash');
        const audio = document.getElementById('bang');

        if (!image || !flash || !audio) {
            console.warn('[Flashbang Script] Missing required elements (.flashbang-img, .flash, #bang)');
            return;
        }

        image.style.display = 'block';
        flash.style.transition = 'none';
        flash.style.opacity = 0;
        audio.currentTime = 0;

        requestAnimationFrame(() => {
            // play sound
            audio.play().catch(() => {}); 

            // flash fade in
            flash.style.transition = `opacity ${fadeIn}ms ease`;
            flash.style.opacity = 1;

            // hold & fade out
            setTimeout(() => {
                // Fade Out (White Flash)
                flash.style.transition = `opacity ${fadeOut}ms ease`;
                flash.style.opacity = 0;
                
                // hide the image
                setTimeout(() => {
                    image.style.display = 'none';
                }, fadeOut);

            }, fadeIn + hold);
        });
    }
  </script>
</body>
</html>
